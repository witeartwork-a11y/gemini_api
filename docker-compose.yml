version: '3.8'

services:
  app:
    build: .
    ports:
      - "3001:3001"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - CORS_ORIGIN=http://localhost:3001
      - KEY_ENCRYPTION_SECRET=${KEY_ENCRYPTION_SECRET}
    restart: unless-stopped

networks:
  default:
    name: gemini-app
